<html lang="en">

    <style>
      ::-webkit-scrollbar {
        display: none;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu,
          Cantarell, sans-serif;
        background: #202020;
        min-height: 100vh;
        padding: 20px;
        color: #fbfbfe;
      }

      .header {
        display: flex;
        align-items: center;
        gap: 0px;
        padding: 10px 20px;
      }

      .main-content {
        max-width: 1000px;
        margin: 0 auto;
        padding-top: 160px;
      }

      .search-container {
        max-width: 700px;
        margin: 0 auto 60px;
        z-index: 99;
      }

      .search-box {
        position: relative;
        width: 100%;
      }

      .search-input {
        width: 100%;
        padding: 14px 45px 14px 45px;
        font-size: 15px;
        border: none;
        border-radius: 8px;
        outline: none;
        background: #2a2a2a;
        color: #fbfbfe;
        box-shadow: 0 1px 4px rgba(0, 0, 0, 0.3);
        transition: all 0.15s ease;
      }

      .search-input:focus {
        border: 0.8px solid #e994e0;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.4);
      }

      .search-input::placeholder {
        color: #8f8f9d;
      }

      .search-icon {
        position: absolute;
        left: 15px;
        top: 50%;
        transform: translateY(-50%);
        width: 18px;
        height: 18px;
        opacity: 0.6;
      }

      .search-icon svg {
        fill: #8f8f9d;
      }

      .search-btn {
        position: absolute;
        right: 8px;
        top: 50%;
        transform: translateY(-50%);
        background: transparent;
        border: none;
        padding: 8px;
        cursor: pointer;
        opacity: 0;
        pointer-events: none;
      }

      .shortcuts-title {
        font-size: 13px;
        font-weight: 600;
        color: #8f8f9d;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        margin-top: 40px;
        margin-bottom: 20px;
        padding: 0 10px;
      }

      .shortcuts {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
        gap: 20px;
        padding: 0 10px;
      }

      .button {
        all: unset;
        display: flex;
        justify-content: center;
        align-items: center;
        flex-direction: column;
        background: #2a2a2a;
        border-radius: 8px;
        padding: 15px 5px 15px 5px;
        gap: 5px;
        font-size: 13px;
        box-shadow: 0 1px 4px rgba(0, 0, 0, 0.1);
      }

      .button:hover {
        background: #4f465b;
      }

      .cat_anim {
        padding-left: 8vw;
      }

      .cat {
        position: absolute;
        top: 38px;
        margin-left: 8px;
        border: none;
      }

      @media (max-width: 768px) {
        .main-content {
          padding-top: 160px;
        }

        .shortcuts {
          grid-template-columns: repeat(auto-fill, minmax(90px, 1fr));
          gap: 15px;
        }

        .shortcut-icon {
          width: 56px;
          height: 56px;
          font-size: 24px;
        }
      }
    </style>

    <script>
      const searchForm = document.getElementById("searchForm");
      const searchInput = document.getElementById("searchInput");

      searchForm.addEventListener("submit", (e) => {
        e.preventDefault();
        const query = searchInput.value.trim();

        if (query) {
          // Check if input looks like a URL
          if (query.includes(".") && !query.includes(" ")) {
            // Add https:// if no protocol specified
            const url = query.startsWith("http") ? query : "https://" + query;
            window.location.href = url;
          } else {
            // Perform Google search
            window.location.href =
              "https://www.google.com/search?q=" + encodeURIComponent(query);
          }
        }
      });

      // Focus search input on '/' key
      document.addEventListener("keydown", (e) => {
        if (e.key === "/" && document.activeElement !== searchInput) {
          e.preventDefault();
          searchInput.focus();
        }
      });
    </script>
